<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reg.css">
</head>
<body>
    <section class="reg">
        <div class="rectangle">
            <p class="p1">Регистрация</p>
            <form action="register.php" method="post" id="registration-form">    
                
                <div class="form-group">
                    <label for="login" class="login-label">Логин:</label>
                    <input
                    class="login-input"
                    type="text"
                    id="login"
                    name="login"
                    required
                    placeholder=" "
                    >
                    <div class="underline"></div>
                </div>

                <div class="form-group1">
                    <label for="password" class="password-label">Пароль:</label>
                    <input
                    class="password-input"
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder=" "
                    >
                     <div class="underline"></div>
                </div>
            </form>

            <form action="reg-successfully.html" method="get"> <!-- добавить экшин-->
                <button type="submit" class="avt-button" id="avt-btn" name="aut" value="send" title="Нажми для отправки"> Продолжить </button>
            </form>

        </div>
       
    </section>
    <script src="reg.js"></script>
</body>
</html>
